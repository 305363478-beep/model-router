name: Test Youlin Windows

on:
  push:
    paths:
      - 'router/**'
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/test-win.yml'
  pull_request:
    paths:
      - 'router/**'
      - 'scripts/**'
      - 'tests/**'
  workflow_dispatch:

jobs:
  # ==================== 静态 + 冒烟 ====================
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Batch scripts check
        shell: pwsh
        run: |
          $install = Get-Content scripts/安装-Windows.bat
          $startup = Get-Content scripts/启动Youlin.bat
          @(
            @{File="安装-Windows.bat"; Checks=@("where node","xcopy","USERPROFILE")},
            @{File="启动Youlin.bat";   Checks=@("where node","127.0.0.1:8787")}
          ) | ForEach-Object {
            $content = Get-Content "scripts/$($_.File)"
            foreach ($k in $_.Checks) {
              if ($content -match [regex]::Escape($k)) { Write-Host "PASS: $($_.File) - $k" }
              else { throw "FAIL: $($_.File) missing $k" }
            }
          }

      - name: JS file parse check
        run: |
          Get-ChildItem -Path router -Recurse -Filter *.js | ForEach-Object {
            if ((Get-Content $_.FullName -Raw).Length -lt 10) { throw "Too short: $($_.Name)" }
          }
          Write-Host "All JS files OK"

      - name: Platform branch check
        run: |
          if ((Get-Content router/bin/router-ui.js -Raw) -match 'win32') { Write-Host "PASS: win32 branch" }
          else { throw "FAIL: missing win32" }

      - name: Start server + smoke test
        run: |
          Start-Process -NoNewWindow -FilePath "node" -ArgumentList "router/bin/router-ui.js","--port","8787"
          for ($i=0; $i -lt 10; $i++) {
            try { Invoke-WebRequest "http://127.0.0.1:8787/api/status" -UseBasicParsing -TimeoutSec 2 | Out-Null; Write-Host "Server UP"; break }
            catch { Start-Sleep 1 }
          }

  # ==================== Playwright UI 测试 ====================
  ui:
    needs: smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install Playwright
        run: |
          npm init -y --silent
          npm install @playwright/test --save-dev
          npx playwright install chromium --with-deps

      - name: Start Youlin server
        run: |
          Start-Process -NoNewWindow -FilePath "node" -ArgumentList "router/bin/router-ui.js","--port","8787"
          for ($i=0; $i -lt 10; $i++) {
            try { Invoke-WebRequest "http://127.0.0.1:8787/api/status" -UseBasicParsing -TimeoutSec 2 | Out-Null; Write-Host "Server UP"; break }
            catch { Start-Sleep 1 }
          }

      - name: Run Playwright UI tests
        run: npx playwright test tests/youlin-ui.spec.mjs --reporter=list

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: youlin-screenshots
          path: test-results/*.png
          retention-days: 7

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
